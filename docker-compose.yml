services:

  backend:
    build: ./backend
    container_name: cgi-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: cgi-frontend

  nginx:
    image: nginx:alpine
    container_name: cgi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend